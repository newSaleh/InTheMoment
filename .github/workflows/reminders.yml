name: Send reminders

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: reminders
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check for due reminders and handle commands
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TZ_NAME: ${{ vars.TZ_NAME }}
          ACTIVE_HOUR_START: ${{ vars.ACTIVE_HOUR_START }}
          ACTIVE_HOUR_END: ${{ vars.ACTIVE_HOUR_END }}
          MIN_DAILY_REMINDERS: ${{ vars.MIN_DAILY_REMINDERS }}
          MAX_DAILY_REMINDERS: ${{ vars.MAX_DAILY_REMINDERS }}
          MIN_GAP_MINUTES: ${{ vars.MIN_GAP_MINUTES }}
        run: python bot/serverless.py

      - name: Commit updated state if it changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/state.json
          git diff --cached --quiet || git commit -m "Update reminder state"
          git push
